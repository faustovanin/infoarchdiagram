<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Brand rounded square (matches header logo bg-brand-500) -->
  <rect width="32" height="32" rx="7" fill="#6366f1"/>
  <!-- Schema / tree glyph in white: one root branching to three nodes -->
  <g fill="#ffffff">
    <!-- connectors -->
    <path d="M13 16 h4" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M15 16 v-8 h2" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M15 16 v8 h2" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- root node (left) -->
    <rect x="5" y="12.5" width="7" height="7" rx="1.8"/>
    <!-- child nodes (right column) -->
    <rect x="18" y="4.5" width="9" height="7" rx="1.8"/>
    <rect x="18" y="12.5" width="9" height="7" rx="1.8"/>
    <rect x="18" y="20.5" width="9" height="7" rx="1.8"/>
  </g>
</svg>
